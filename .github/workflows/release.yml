name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

# Queue concurrent tag pushes instead of cancelling — cancelling mid-upload
# leaves CurseForge/Wago/GitHub out of sync.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read

    steps:
      - name: Wait for required CI checks on the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          required_checks=$(cat <<'EOF'
          Lint (luacheck)
          Format (StyLua)
          TOC graph (dead files)
          Security (addon rules)
          Security (workflows, zizmor)
          Security (secrets, gitleaks)
          Test Package Creation
          EOF
          )

          # Poll every 30s for up to 20 minutes. Every required check must
          # exist and be completed with conclusion success (latest run per
          # name). A tag on a commit CI never saw must not release.
          deadline=$(( $(date +%s) + 20 * 60 ))

          while true; do
            runs=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs?per_page=100" \
              --paginate --jq '.check_runs[] | {name, status, conclusion, started_at}' | jq -s '.')

            pending=0
            failed=0
            while IFS= read -r check; do
              latest=$(printf '%s' "$runs" | jq -r --arg name "$check" \
                '[.[] | select(.name == $name)] | sort_by(.started_at) | last // empty | "\(.status)/\(.conclusion)"')
              if [ -z "$latest" ]; then
                echo "  $check: no check run found yet"
                pending=1
              elif [ "$latest" = "completed/success" ]; then
                echo "  $check: success"
              elif [ "${latest%%/*}" = "completed" ]; then
                echo "::error::required check '$check' completed with conclusion '${latest#*/}'"
                failed=1
              else
                echo "  $check: ${latest%%/*}"
                pending=1
              fi
            done <<< "$required_checks"

            if [ "$failed" -ne 0 ]; then
              echo "::error::CI is not green on $GITHUB_SHA — refusing to release"
              exit 1
            fi
            if [ "$pending" -eq 0 ]; then
              echo "All required CI checks are green on $GITHUB_SHA"
              exit 0
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::timed out after 20 minutes waiting for required CI checks on $GITHUB_SHA (missing or incomplete checks above)"
              exit 1
            fi
            echo "Waiting 30s for CI checks to complete..."
            sleep 30
          done

  release:
    name: Release to CurseForge & Wago
    runs-on: ubuntu-latest
    needs: verify-ci
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install SVN
        run: sudo apt-get install -y subversion

      - name: Install packager
        run: |
          curl -s https://raw.githubusercontent.com/BigWigsMods/packager/master/release.sh -o release.sh
          chmod +x release.sh

      - name: Package and release
        run: ./release.sh
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: |
            .release/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release announcement
        if: success()
        id: announce
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          # Determine bump type by comparing semver components
          EMOJI="🔧"
          COLOR=5763719  # green (patch)
          if [ -n "$PREV_TAG" ]; then
            PREV_VERSION="${PREV_TAG#v}"
            CUR_MAJOR="${VERSION%%.*}"
            CUR_REST="${VERSION#*.}"
            CUR_MINOR="${CUR_REST%%.*}"
            PREV_MAJOR="${PREV_VERSION%%.*}"
            PREV_REST="${PREV_VERSION#*.}"
            PREV_MINOR="${PREV_REST%%.*}"

            if [ "$CUR_MAJOR" -gt "$PREV_MAJOR" ]; then
              EMOJI="🚀"
              COLOR=15548997  # red (major)
            elif [ "$CUR_MINOR" -gt "$PREV_MINOR" ]; then
              EMOJI="🤏"
              COLOR=3447003   # blue (minor)
            fi
          fi

          # Fetch release notes from the GitHub Release
          BODY=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.body // ""')

          {
            echo "tag=${TAG}"
            echo "emoji=${EMOJI}"
            echo "color=${COLOR}"
            echo 'body<<TONK_NOTES_EOF'
            printf '%s\n' "$BODY"
            echo TONK_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: success()
        uses: zandoh/tonk@0375661d90724e2b4e0b53a706362c14e27e8fee # v2.1.0
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: "${{ steps.announce.outputs.emoji }} ZandyTools ${{ steps.announce.outputs.tag }} Released!"
          description: ${{ steps.announce.outputs.body }}
          url: https://github.com/${{ github.repository }}/releases/tag/${{ steps.announce.outputs.tag }}
          color: ${{ steps.announce.outputs.color }}

      # Release failures are announced by tonk.yml (workflow_run on this
      # workflow), which also reports back-to-green on the next good run.
