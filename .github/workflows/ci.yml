name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (luacheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run luacheck
        uses: lunarmodules/luacheck@cc089e3f65acdd1ef8716cc73a3eca24a6b845e4 # v1.2.0
        with:
          args: . --no-color -q

  format:
    name: Format (StyLua)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install StyLua
        run: |
          curl -sSfL -o /tmp/stylua.zip https://github.com/JohnnyMorganz/StyLua/releases/download/v2.5.2/stylua-linux-x86_64.zip
          unzip -o /tmp/stylua.zip -d /tmp/stylua-bin

      - name: Check formatting
        run: /tmp/stylua-bin/stylua --check .

  toc-graph:
    name: TOC graph (dead files)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Check TOC file graph
        run: ./scripts/check-toc.sh

  addon-security:
    name: Security (addon rules)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Forbid dynamic code execution
        run: |
          matches=$(grep -rnE '\b(loadstring|RunScript)[[:space:]]*\(' --include='*.lua' --exclude-dir=Libs . || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::dynamic code execution (loadstring/RunScript) is forbidden in addon code"
            exit 1
          fi
          echo "No dynamic code execution in addon code"

  workflow-security:
    name: Security (workflows, zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          min-severity: low

  secret-scan:
    name: Security (secrets, gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Intentionally no finding details in the embed — never forward
      # potential secrets to Discord. Details live in the run logs only.
      - name: Notify Discord on secret detection
        if: failure()
        uses: zandoh/tonk@56ab9f31ad8f7e1c5808db6c42b8d772815b2995 # v2.0.1
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: 🚨 gitleaks flagged potential secrets on ${{ github.head_ref || github.ref_name }}
          description: Review the run logs and rotate anything exposed before doing anything else.
          color: "15548997"

  type-check:
    name: Type check (emmylua, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install emmylua_check
        run: |
          mkdir -p /tmp/emmylua
          curl -sSfL https://github.com/EmmyLuaLs/emmylua-analyzer-rust/releases/download/0.23.2/emmylua_check-linux-x64.tar.gz | tar xz -C /tmp/emmylua

      - name: Run emmylua_check
        run: /tmp/emmylua/emmylua_check --warnings-as-errors .

  package-test:
    name: Test Package Creation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install SVN
        run: sudo apt-get install -y subversion

      - name: Install packager
        run: |
          curl -s https://raw.githubusercontent.com/BigWigsMods/packager/master/release.sh -o release.sh
          chmod +x release.sh

      - name: Create test package
        run: ./release.sh -d -z

  # Failure and back-to-green notifications live in tonk.yml (workflow_run
  # on this workflow), so they fire even when a run dies before its jobs do.
