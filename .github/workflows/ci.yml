name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions: {}

jobs:
  lint:
    name: Lint (luacheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run luacheck
        uses: lunarmodules/luacheck@cc089e3f65acdd1ef8716cc73a3eca24a6b845e4 # v1.2.0
        with:
          args: . --no-color -q

  format:
    name: Format (StyLua)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install StyLua
        run: |
          curl -sSfL -o /tmp/stylua.zip https://github.com/JohnnyMorganz/StyLua/releases/download/v2.5.2/stylua-linux-x86_64.zip
          unzip -o /tmp/stylua.zip -d /tmp/stylua-bin

      - name: Check formatting
        run: /tmp/stylua-bin/stylua --check .

  toc-graph:
    name: TOC graph (dead files)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Check TOC file graph
        run: ./scripts/check-toc.sh

  addon-security:
    name: Security (addon rules)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Forbid dynamic code execution
        run: |
          matches=$(grep -rnE '\b(loadstring|RunScript)[[:space:]]*\(' --include='*.lua' --exclude-dir=Libs . || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::dynamic code execution (loadstring/RunScript) is forbidden in addon code"
            exit 1
          fi
          echo "No dynamic code execution in addon code"

  workflow-security:
    name: Security (workflows, zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          min-severity: low

  secret-scan:
    name: Security (secrets, gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord on secret detection
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_PROD }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL_PROD not set. Skipping notification."
            exit 0
          fi

          # Intentionally no finding details here — never forward potential
          # secrets to Discord. Details live in the run logs only.
          PAYLOAD=$(jq -nc \
            --arg title "🚨 gitleaks flagged potential secrets on ${BRANCH}" \
            --arg desc "Review the run logs and rotate anything exposed before doing anything else." \
            --arg url "$RUN_URL" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 15548997
              }]
            }')

          curl -sf -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"

  type-check:
    name: Type check (emmylua, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install emmylua_check
        run: |
          mkdir -p /tmp/emmylua
          curl -sSfL https://github.com/EmmyLuaLs/emmylua-analyzer-rust/releases/download/0.23.2/emmylua_check-linux-x64.tar.gz | tar xz -C /tmp/emmylua

      - name: Run emmylua_check
        run: /tmp/emmylua/emmylua_check --warnings-as-errors .

  package-test:
    name: Test Package Creation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install SVN
        run: sudo apt-get install -y subversion

      - name: Install packager
        run: |
          curl -s https://raw.githubusercontent.com/BigWigsMods/packager/master/release.sh -o release.sh
          chmod +x release.sh

      - name: Create test package
        run: ./release.sh -d -z

  notify-recovered:
    name: Notify Discord on recovery
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - toc-graph
      - addon-security
      - workflow-security
      - secret-scan
      - package-test
    if: success() && github.event_name == 'push'
    permissions:
      actions: read
    steps:
      - name: Notify if previous run failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_PROD }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # The current run is still in_progress, so the most recent completed
          # push run on this branch is the previous one.
          PREV=$(gh api "repos/${REPO}/actions/workflows/ci.yml/runs?branch=${BRANCH}&event=push&status=completed&per_page=1" \
            --jq '.workflow_runs[0].conclusion // ""')

          if [ "$PREV" != "failure" ]; then
            echo "Previous run conclusion: '${PREV:-none}'. No recovery to report."
            exit 0
          fi

          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL_PROD not set. Skipping notification."
            exit 0
          fi

          PAYLOAD=$(jq -nc \
            --arg title "✅ CI back to green on ${BRANCH}" \
            --arg url "$RUN_URL" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: 5763719
              }]
            }')

          curl -sf -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"

  notify-failure:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - toc-graph
      - addon-security
      - workflow-security
      - secret-scan
      - package-test
    if: failure()
    permissions: {}
    steps:
      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_PROD }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL_PROD not set. Skipping notification."
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            DESC="$PR_TITLE"
          else
            # First line of the commit message only
            DESC="${COMMIT_MSG%%$'\n'*}"
          fi

          PAYLOAD=$(jq -nc \
            --arg title "❌ CI failed on ${BRANCH}" \
            --arg desc "$DESC" \
            --arg url "$RUN_URL" \
            --arg footer "triggered by ${ACTOR}" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 15548997,
                footer: { text: $footer }
              }]
            }')

          curl -sf -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
