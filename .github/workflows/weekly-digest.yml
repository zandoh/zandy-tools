name: Weekly Issue Digest

on:
  schedule:
    # Mondays 14:00 UTC (~9-10am ET)
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  digest:
    name: Post open-issue digest
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
      - name: Collect open issues
        id: digest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Exclude PRs, which the issues API also returns
          ISSUES=$(gh api "repos/${REPO}/issues?state=open&per_page=100" \
            --jq '[.[] | select(.pull_request == null)]')
          COUNT=$(jq 'length' <<<"$ISSUES")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -eq 0 ]; then
            echo "No open issues; skipping digest."
            exit 0
          fi

          {
            echo 'desc<<TONK_DIGEST_EOF'
            jq -r '.[] | "- [#\(.number)](\(.html_url)) \(.title) — opened \(.created_at[:10])"' <<<"$ISSUES"
            echo TONK_DIGEST_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Send digest to Discord
        if: steps.digest.outputs.count != '0'
        uses: zandoh/tonk@dc0f2ab7c2ab790b890c8e20749ac83992063bff # v2.0.0
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: "📋 Weekly digest: ${{ steps.digest.outputs.count }} open issue(s)"
          description: ${{ steps.digest.outputs.desc }}
          url: https://github.com/${{ github.repository }}/issues
          color: "3447003"
