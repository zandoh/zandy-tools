# TEMPORARY — exports legacy webhook secrets RSA-encrypted so the tonk
# migration can re-key them as TONK_DISCORD_WEBHOOK. Deleted right after use.
name: tonk secret export (temporary)
on:
  workflow_dispatch:
    inputs:
      pubkey_b64:
        description: base64-encoded RSA public key PEM
        required: true
permissions: {}
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Print RSA-encrypted secret values
        env:
          PUBKEY_B64: ${{ inputs.pubkey_b64 }}
          S1: ${{ secrets.DISCORD_WEBHOOK_URL_PROD }}
          S2: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}
        run: |
          printf '%s' "$PUBKEY_B64" | base64 -d > /tmp/pub.pem
          for name in S1 S2; do
            val="${!name-}"
            [ -n "$val" ] || continue
            enc=$(printf '%s' "$val" | openssl pkeyutl -encrypt -pubin -inkey /tmp/pub.pem -pkeyopt rsa_padding_mode:oaep | base64 -w0)
            echo "TONKEXPORT ${name} ${enc}"
          done
